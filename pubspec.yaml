name: ghar_ka_hisab
description: "گھر کا حساب - آفلائن گھریلو اکاؤنٹنگ ایپلیکیشن"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Charts
  fl_chart: ^0.68.0

  # Formatting
  intl: ^0.20.2

  # PDF
  pdf: ^3.11.0
  printing: ^5.13.1

  # Auth
  local_auth: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # Storage / Preferences
  shared_preferences: ^2.2.3

  # File picking for backup/restore
  file_picker: ^8.0.6

  # UI helpers
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: false

  # Uncomment and add asset paths if custom Urdu fonts are bundled locally.
  # fonts:
  #   - family: NotoNastaliqUrdu
  #     fonts:
  #       - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
  #       - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
  #         weight: 700
